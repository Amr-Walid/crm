<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UniGroup CRM</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script>
        // Apply persisted theme before first paint to avoid flash.
        try {
            var t = localStorage.getItem('unigroup.theme');
            if (t) document.documentElement.setAttribute('data-theme', t);
            else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
                document.documentElement.setAttribute('data-theme', 'dark');
        } catch (e) { }
    </script>
    <script>
        // Apply persisted language & direction before first paint to avoid flash.
        try {
            var l = localStorage.getItem('unigroup.lang') || 'en';
            document.documentElement.setAttribute('lang', l);
            document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
        } catch (e) { }
    </script>
    <script>
        // Detect embedded (Chatwoot iframe) mode before first paint and tag the
        // <html> element so CSS can hide the CRM chrome with zero flash. Both an
        // explicit ?embedded=true flag and actually being framed count as embedded.
        try {
            var qs = window.location.search || '';
            var flagged = /[?&]embedded(=(1|true|yes))?(&|$)/i.test(qs);
            var framed = window.self !== window.top;
            if (flagged || framed) {
                document.documentElement.setAttribute('data-embedded', 'true');
            }
        } catch (e) { }
    </script>
    <script>
        // ============================================================
        // Chatwoot Dashboard-App bridge (window "message" listener).
        // Registered before Blazor boots so no context event is missed.
        // Chatwoot posts a JSON string payload to the iframe whenever the
        // agent opens/switches a conversation; we normalize it, keep the
        // latest context, and forward changes to any registered Blazor
        // subscribers (the global ChatwootContextService and/or the widget
        // page) once they register a .NET object reference.
        // ============================================================
        (function () {
            var bridge = window.chatwootBridge = {
                lastContext: null,
                _refs: [],

                // Multiple subscribers are supported (global context service +
                // legacy widget page). Each registers its own .NET reference.
                register: function (dotnetRef) {
                    if (this._refs.indexOf(dotnetRef) === -1) this._refs.push(dotnetRef);
                    // Replay the buffered context so subscribers get data even
                    // if Chatwoot posted it before Blazor finished booting.
                    if (this.lastContext) this._notifyOne(dotnetRef, this.lastContext);
                    // Ask Chatwoot to (re)send the current conversation info.
                    this.requestInfo();
                },
                unregister: function (dotnetRef) {
                    if (dotnetRef == null) { this._refs = []; return; }
                    var i = this._refs.indexOf(dotnetRef);
                    if (i !== -1) this._refs.splice(i, 1);
                },
                requestInfo: function () {
                    try { window.parent.postMessage('chatwoot-dashboard-app:fetch-info', '*'); } catch (e) { }
                },
                // Push text straight into the Chatwoot agent reply editor. We post
                // the documented Dashboard-App reply payload (a few historical
                // event names are sent for cross-version compatibility). Always
                // returns whether we appear to be framed inside Chatwoot; the
                // caller still copies to the clipboard as a guaranteed fallback.
                pasteToReply: function (text) {
                    if (text == null) return false;
                    var framed = false;
                    try { framed = window.parent && window.parent !== window; } catch (e) { framed = false; }
                    if (!framed) return false;
                    var payloads = [
                        { event: 'appContext', content: text },
                        JSON.stringify({ event: 'set-conversation-content', data: { content: text } }),
                        JSON.stringify({ event: 'setReplyContent', data: { content: text } })
                    ];
                    try {
                        window.parent.postMessage(JSON.stringify({ event: 'set-conversation-content', data: { content: text } }), '*');
                        window.parent.postMessage(JSON.stringify({ event: 'setReplyContent', data: { content: text } }), '*');
                    } catch (e) { }
                    return true;
                },
                _notifyOne: function (ref, ctx) {
                    try { ref.invokeMethodAsync('OnChatwootContext', ctx); } catch (e) { }
                },
                _notify: function (ctx) {
                    for (var i = 0; i < this._refs.length; i++) {
                        this._notifyOne(this._refs[i], ctx);
                    }
                }
            };

            window.addEventListener('message', function (event) {
                var raw = event.data;
                if (typeof raw !== 'string' || raw.indexOf('chatwoot-widget') !== -1) return;
                var payload;
                try { payload = JSON.parse(raw); } catch (e) { return; }
                if (!payload || payload.event !== 'appContext' || !payload.data) return;

                // Receiving appContext confirms we are embedded in Chatwoot.
                document.documentElement.setAttribute('data-embedded', 'true');

                var data = payload.data;
                var conv = data.conversation || {};
                var contact = data.contact || (conv.meta && conv.meta.sender) || {};

                var ctx = {
                    conversationId: conv.id != null ? String(conv.id) : null,
                    contactId: contact.id != null ? String(contact.id) : null,
                    contactName: contact.name || null,
                    contactPhone: contact.phone_number || null,
                    contactEmail: contact.email || null
                };
                bridge.lastContext = ctx;
                bridge._notify(ctx);
            });
        })();
    </script>
</head>

<body>
    <div id="app">
        <div class="boot-loader">
            <div class="boot-mark">U</div>
            <div class="boot-title">UniGroup <span>CRM</span></div>
            <div class="boot-bar"><div class="boot-bar-fill"></div></div>
            <div class="boot-sub">Loading experience…</div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss"><i class="bi bi-x-lg"></i></span>
    </div>
    <script src="js/app.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
